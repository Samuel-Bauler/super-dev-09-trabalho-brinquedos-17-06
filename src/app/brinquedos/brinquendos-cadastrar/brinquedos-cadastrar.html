<label for="nome">Nome do brinquedo:</label>
<input type="text" id="nome" [(ngModel)]="brinquedo().nome">

<label for="quantidade">quantidade</label>
<input type="number" id="quantidade"[(ngModel)]="brinquedo().quantidade">

<label for="preco">Preço</label>
<input type="number" id="preco" [(ngModel)]="brinquedo().preco">

<label for="marca">Marca</label>
<select name="marca" id="marca" [(ngModel)]="brinquedo().marca">
    <option value="estrela">Estrela</option>
    <option value="mattel">Mattel</option>
    <option value="lego">lego</option>
</select>

<button (click)="salvar()">Salvar</button>
